<!DOCTYPE html>
<html>
<head>
    <title>Empathy Engine</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .container {
            margin-top: 60px;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        select {
            padding: 8px;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .controls {
            margin-top: 15px;
        }

        audio {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎙️ Empathy Engine</h1>
    <p>Generate emotionally expressive speech from text</p>

    <form method="POST">
        <textarea name="text" placeholder="Enter your text..." required></textarea>

        <div class="controls">
            <label>Select Voice:</label>
            <select name="voice">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>

            <button type="submit">Generate</button>
        </div>
    </form>

    {% if text %}
        <h3>Detected Emotion: {{ emotion }}</h3>
        <audio controls>
            <source src="/static/output.mp3" type="audio/mp3">
        </audio>
    {% endif %}
</div>

</body>
</html>
